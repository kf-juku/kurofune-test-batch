<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>答案アップロード｜クロフネ</title>
<style>
:root{
  --crimson:#c6000b; --crimson-dark:#9e0009; --text:#1f2937; --text-muted:#6b7280;
  --border:#e5e7eb; --surface:#f8f9fb; --bg:#f2f3f6; --success:#16a34a; --danger:#dc2626; --warn:#b45309;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);}
.wrap{max-width:560px;margin:0 auto;padding:0 14px 40px;}
.appbar{position:sticky;top:0;z-index:5;background:var(--crimson);color:#fff;display:flex;align-items:center;gap:8px;padding:12px 14px;}
.appbar .logo{font-size:1.2rem;}
.appbar .title{font-weight:800;font-size:15px;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;}
input[type=password],input[type=text]{width:100%;padding:13px 12px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;background:#fff;}
input:focus{outline:none;border-color:var(--crimson);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer;background:#eef0f4;color:var(--text);}
.btn-primary{background:var(--crimson);color:#fff;width:100%;}
.btn-primary:active{background:var(--crimson-dark);}
.btn-block{width:100%;}
.btn:disabled{opacity:.5;}
.muted{font-size:12.5px;color:var(--text-muted);line-height:1.7;}
.err{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:1em;}
.hidden{display:none;}
.test-item{width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;}
.test-item:active{border-color:var(--crimson);}
.test-item .t-sub{font-weight:800;font-size:15px;}
.test-item .t-name{color:var(--text-muted);font-size:13px;margin-top:2px;}
.banner{display:flex;align-items:center;gap:8px;background:#fff5f5;border:1px solid #f3c9cc;border-radius:12px;padding:12px 14px;font-weight:800;font-size:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;margin-top:14px;}
.cell{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#000;}
.cell img{width:100%;height:96px;object-fit:cover;display:block;opacity:.95;}
.cell .rm{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:6px;font-size:12px;line-height:1;padding:3px 6px;cursor:pointer;}
.cell .st{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);color:#fff;font-size:10.5px;padding:3px 5px;display:flex;justify-content:space-between;gap:4px;}
.badge{display:inline-block;border-radius:20px;padding:1px 8px;font-size:10.5px;font-weight:800;}
.b-wait{background:#e5e7eb;color:#374151;}
.b-run{background:#dbeafe;color:#1d4ed8;}
.b-done{background:#dcfce7;color:#166534;}
.b-fail{background:#fee2e2;color:#991b1b;}
.prog{height:8px;border-radius:6px;background:#eef0f4;overflow:hidden;margin:12px 0 6px;}
.prog>i{display:block;height:100%;background:var(--crimson);width:0;transition:width .3s;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:20;}
.toast.show{opacity:.95;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="appbar"><span class="logo">📷</span><span class="title">答案アップロード｜クロフネ</span></div>
<div class="wrap">

  <!-- パスワード画面 -->
  <div id="passScreen">
    <div class="card">
      <div style="text-align:center;font-size:1.8rem;">🔒</div>
      <div style="text-align:center;font-weight:800;margin:6px 0 2px;">パスワードを入力</div>
      <p class="muted" style="text-align:center;margin-bottom:16px;">先生用のアップロードページです。パスワードは最初の1回だけ入力すれば、この端末に保存されます。</p>
      <label class="label">パスワード</label>
      <input type="password" id="passInput" placeholder="パスワードを入力" autocomplete="off" />
      <div class="err" id="passErr"></div>
      <button class="btn btn-primary" style="margin-top:12px;" id="passBtn" onclick="submitPass()">はじめる</button>
    </div>
  </div>

  <!-- メイン -->
  <div id="mainScreen" class="hidden">

    <!-- テスト選択 -->
    <div id="testPick">
      <div class="card">
        <div style="font-weight:800;margin-bottom:4px;">どのテストの答案ですか？</div>
        <p class="muted" style="margin-bottom:12px;">採点するテストを選んでください。</p>
        <div id="testList"><p class="muted">読み込み中…</p></div>
      </div>
    </div>

    <!-- アップロード -->
    <div id="uploadArea" class="hidden">
      <div class="banner" style="margin-top:14px;"><span>📚</span><span id="curTestName">—</span>
        <button class="btn" style="margin-left:auto;padding:6px 10px;font-size:12px;" onclick="backToPick()">変更</button></div>
      <div class="card">
        <p class="muted" style="margin-bottom:12px;">答案を撮る、または写真を選んで追加します（1枚＝1人）。追加できたら「送信して採点」を押すと、その場で採点が始まります。</p>
        <input type="file" id="fileInput" accept="image/*" capture="environment" multiple class="hidden" onchange="onFiles(event)" />
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📷 答案を追加</button>
        <div class="prog hidden" id="progWrap"><i id="progBar"></i></div>
        <div class="muted" id="progLabel" style="min-height:1em;"></div>
        <div class="grid" id="grid"></div>
        <button class="btn btn-primary btn-block hidden" id="sendBtn" style="margin-top:14px;" onclick="sendAll()">🎯 送信して採点</button>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== 設定（採点GAS URLはここに埋め込む。パスワードで守るのでURL自体は秘密でなくてよい） =====
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzMt2naf2SfYixpgc6En5zXAK5eV5jNbVFRtGm7c3etB9GgwhLF5O7IIOaCR9829Uz6/exec';
var CFG_KEY = 'kurofune_upload_cfg';
function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); }catch(e){ return {}; } }
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
var cfg = loadCfg();
var PASS = cfg.pass || '';

var BATCH_SIZE = 3;
var allTests = [];
var selTestId = '';
var selTestName = '';
var selTestData = null;
var images = [];   // {localId, dataUrl, status, readName, score, maxScore, errorMsg}
var isSending = false;

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2400); }
function gasCall(payload){ var _p={}; for(var k in payload){ _p[k]=payload[k]; } _p.pass=PASS; return fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(_p)}).then(function(r){ return r.json(); }); }

// ===== パスワード =====
function submitPass(){
  var v=document.getElementById('passInput').value.trim();
  if(!v){ document.getElementById('passErr').textContent='パスワードを入力してください'; return; }
  PASS=v;
  document.getElementById('passErr').textContent='確認中…';
  document.getElementById('passBtn').disabled=true;
  // getTests を叩いてパスワードの正否を確認（UPLOAD_PASS設定後は誤りだと弾かれる）
  gasCall({action:'getTests'}).then(function(res){
    document.getElementById('passBtn').disabled=false;
    if(res && res.success){
      cfg.pass=PASS; saveCfg(cfg);
      allTests = res.tests || [];
      enterMain();
    } else {
      var msg=(res&&res.error)||'パスワードが違います';
      document.getElementById('passErr').textContent = /認証/.test(msg) ? 'パスワードが違います' : ('取得に失敗: '+msg);
    }
  }).catch(function(e){
    document.getElementById('passBtn').disabled=false;
    document.getElementById('passErr').textContent='通信に失敗しました（電波・URLを確認）';
  });
}

function enterMain(){
  document.getElementById('passScreen').classList.add('hidden');
  document.getElementById('mainScreen').classList.remove('hidden');
  renderTests();
}

// ===== テスト選択 =====
function renderTests(){
  var box=document.getElementById('testList');
  if(!allTests.length){ box.innerHTML='<p class="muted">登録済みのテストがありません。PCの管理画面でテストを登録してください。</p>'; return; }
  box.innerHTML = allTests.map(function(t){
    var name = esc(t.name||t.testName||t.testId);
    var sub = esc(t.subject||'');
    return '<button class="test-item" onclick="pickTest(\''+esc(t.testId)+'\')"><div class="t-sub">'+(sub||name)+'</div>'+(sub?'<div class="t-name">'+name+'</div>':'')+'</button>';
  }).join('');
}
function pickTest(id){
  var t=allTests.find(function(x){ return x.testId===id; });
  selTestId=id; selTestName=t?(t.name||t.testName||id):id;
  document.getElementById('curTestName').textContent=selTestName;
  document.getElementById('testPick').classList.add('hidden');
  document.getElementById('uploadArea').classList.remove('hidden');
  selTestData=null;
  // 採点用のテスト情報を先読み（正解・配点・対象学年）
  gasCall({action:'getTest', testId:id}).then(function(res){
    selTestData = res && (res.testData || res.test) || null;
    if(!selTestData){ showToast('テスト情報の取得に失敗しました'); }
  }).catch(function(){ showToast('テスト情報の取得に失敗しました'); });
}
function backToPick(){
  if(isSending){ showToast('採点中は変更できません'); return; }
  selTestId=''; images=[]; renderGrid();
  document.getElementById('uploadArea').classList.add('hidden');
  document.getElementById('testPick').classList.remove('hidden');
}

// ===== 画像追加 =====
var _idc=0;
function onFiles(ev){
  var files=ev.target.files; if(!files||!files.length){ return; }
  var pending=files.length;
  Array.prototype.forEach.call(files, function(file){
    if(!/^image\//.test(file.type)){ pending--; if(pending<=0){ renderGrid(); } return; }
    var reader=new FileReader();
    reader.onload=function(e){ images.push({localId:'i'+(++_idc), dataUrl:e.target.result, status:'未送信'}); pending--; if(pending<=0){ renderGrid(); } };
    reader.onerror=function(){ pending--; if(pending<=0){ renderGrid(); } };
    reader.readAsDataURL(file);
  });
  ev.target.value='';
}
function removeImg(id){ if(isSending){ return; } images=images.filter(function(im){ return im.localId!==id; }); renderGrid(); }
function badgeFor(st){ return st==='完了'?'b-done':(st==='失敗'?'b-fail':(st==='採点中'?'b-run':'b-wait')); }
function renderGrid(){
  var g=document.getElementById('grid');
  g.innerHTML=images.map(function(im){
    var right = im.status==='完了' ? (im.readName?esc(im.readName):'完了') : (im.status==='失敗'?'失敗':'');
    var score = (im.status==='完了' && im.score!=null) ? (im.score+'/'+im.maxScore) : '';
    return '<div class="cell"><img src="'+im.dataUrl+'">'+
      (isSending?'':'<button class="rm" onclick="removeImg(\''+im.localId+'\')">✕</button>')+
      '<div class="st"><span class="badge '+badgeFor(im.status)+'">'+esc(im.status)+'</span><span>'+esc(score||right)+'</span></div></div>';
  }).join('');
  var has=images.some(function(im){ return im.status==='未送信'||im.status==='失敗'; });
  document.getElementById('sendBtn').classList.toggle('hidden', !images.length);
  document.getElementById('sendBtn').disabled = isSending || !has;
}

// ===== 送信して採点 =====
function makeJobId(){ var d=new Date(); function z(n){ return (n<10?'0':'')+n; } return 'job_'+d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes())+z(d.getSeconds()); }
function setProg(done,total,label){
  var w=document.getElementById('progWrap'), b=document.getElementById('progBar'), l=document.getElementById('progLabel');
  w.classList.toggle('hidden', total<=0);
  b.style.width = total>0 ? Math.round(done/total*100)+'%' : '0%';
  l.textContent = label||'';
}
function gradeOne(im, jobId){
  var b64=(im.dataUrl.indexOf(',')>=0)?im.dataUrl.split(',')[1]:im.dataUrl;
  var mime='image/jpeg'; var mm=/^data:(image\/[a-zA-Z0-9.+-]+);base64/.exec(im.dataUrl); if(mm){ mime=mm[1]; }
  var tgrade=(selTestData&&(selTestData.targetGrade||selTestData.grade))||'';
  return gasCall({action:'grade', testId:selTestId, testData:selTestData, imageBase64:b64, imageType:mime, studentName:'', grade:tgrade, jobId:jobId})
    .then(function(res){
      if(!res||!res.success){ im.status='失敗'; im.errorMsg=(res&&res.error)||'通信エラー'; return; }
      im.status='完了'; im.readName=res.studentName||'';
      var r=res.result||{}; im.score=(r.totalScore!=null)?r.totalScore:null; im.maxScore=(r.maxScore!=null)?r.maxScore:'';
    })
    .catch(function(e){ im.status='失敗'; im.errorMsg=e.message; });
}
function sendAll(){
  if(isSending){ return; }
  if(!selTestId){ showToast('先にテストを選んでください'); return; }
  if(!selTestData){ showToast('テスト情報を取得中です。数秒待って再度押してください'); return; }
  var pending=images.filter(function(im){ return im.status==='未送信'||im.status==='失敗'; });
  if(!pending.length){ showToast('送信する答案がありません'); return; }
  isSending=true; renderGrid();
  var total=pending.length, done=0, jobId=makeJobId();
  setProg(0,total,'採点中… 0/'+total+'枚');
  var batches=[]; for(var i=0;i<pending.length;i+=BATCH_SIZE){ batches.push(pending.slice(i,i+BATCH_SIZE)); }
  function run(bi){
    if(bi>=batches.length){
      var fail=images.filter(function(im){ return im.status==='失敗'; }).length;
      setProg(total,total,'採点完了（失敗'+fail+'件）'+(fail?'　失敗分はもう一度送信できます':''));
      isSending=false; renderGrid();
      showToast(fail?('採点完了。失敗'+fail+'件'):'採点が完了しました');
      return;
    }
    var batch=batches[bi];
    batch.forEach(function(im){ im.status='採点中'; }); renderGrid();
    Promise.all(batch.map(function(im){ return gradeOne(im,jobId).then(function(){ done++; setProg(done,total,'採点中… '+done+'/'+total+'枚'); renderGrid(); }); }))
      .then(function(){ run(bi+1); });
  }
  run(0);
}

// ===== 起動 =====
(function init(){
  if(PASS){ // 保存済みのパスワードで自動的にテスト取得を試す
    gasCall({action:'getTests'}).then(function(res){
      if(res && res.success){ allTests=res.tests||[]; enterMain(); }
      else { document.getElementById('passErr').textContent = /認証/.test((res&&res.error)||'') ? 'パスワードが変わったようです。入れ直してください' : ''; }
    }).catch(function(){});
  }
  document.getElementById('passInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ submitPass(); } });
})();
</script>
</body>
</html>
